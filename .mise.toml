# norii 개발환경 — 툴 버전 핀 + 태스크 단일 출처.
# `mise install`로 고정 버전 세팅, `mise run <task>`로 실행. 팀/CI가 동일 환경을 재현한다.
# 상세는 .claude/docs/development-commands.md를 단일 출처로 둔다.

[tools]
node = "24"
rust = "stable"
# 기본(aqua) 백엔드는 Intel mac(darwin/amd64)용 pnpm을 지원하지 않아 npm 백엔드로 설치한다.
"npm:pnpm" = "11.10.0"

[env]
# 태스크가 oxlint·oxfmt·steiger·turbo를 맨 이름으로 호출하므로 워크스페이스 실행 파일 경로를 PATH에 추가한다.
_.path = ["{{config_root}}/node_modules/.bin"]

# 개발 서버 포트는 기동 전에 고른다 — 기본 포트가 이미 쓰이면 다음 빈 포트로 넘어간다.
# Vite(strictPort)와 Tauri devUrl이 같은 값을 봐야 하므로, 고른 포트를 양쪽에 함께 넘긴다.
# (dev와 dev-webdriver를 동시에 띄울 수 있다 — E2E를 돌리려고 개발 앱을 끌 필요가 없다.)
[tasks.dev]
description = "데스크탑 앱 개발 모드 실행 (Vite + Tauri, 포트 자동 선택)"
run = """
PORT=$(node scripts/free-port.mjs 1420)
echo "dev 서버 포트: $PORT"
NORII_DEV_PORT=$PORT pnpm --filter desktop tauri dev \
  --config "{\\"build\\":{\\"devUrl\\":\\"http://localhost:$PORT\\"}}"
"""

[tasks.dev-webdriver]
description = "E2E용 개발 실행 — webdriver 피처를 켜 임베디드 WebDriver(127.0.0.1:4445) 기동"
# E2E 허용 루트 — 테스트(e2e/*.e2e.ts)와 같은 기본값을 공유한다(다이얼로그 대체 입구).
env = { NORII_E2E_SCOPE_ROOT = "/tmp/norii-e2e" }
# dev(1420~)와 겹치지 않게 다른 대역에서 시작한다 — 둘을 동시에 띄우는 것이 정상 흐름이다.
run = """
PORT=$(node scripts/free-port.mjs 1520)
echo "dev-webdriver 서버 포트: $PORT"
NORII_DEV_PORT=$PORT pnpm --filter desktop tauri dev --features webdriver \
  --config "{\\"build\\":{\\"devUrl\\":\\"http://localhost:$PORT\\"}}"
"""

[tasks.build]
description = "데스크탑 앱 릴리스 빌드"
run = "pnpm --filter desktop tauri build"

# --- JS/TS 품질 (Oxc 패밀리) ---
[tasks.lint]
description = "JS/TS 린트 (oxlint — 전체 저장소 1패스)"
run = "oxlint"

[tasks.fmt]
description = "JS/TS 포맷 적용 (oxfmt)"
run = "oxfmt ."

[tasks.fmt-check]
description = "JS/TS 포맷 검증 (수정 없음)"
run = "oxfmt --check ."

[tasks.fsd-lint]
description = "FSD 아키텍처 검증 (steiger — 레이어 참조·Public API·구조)"
# steiger는 cosmiconfig로 cwd에서 위로만 config를 탐색하므로, steiger.config.ts가 있는 앱 디렉터리에서 실행한다.
dir = "apps/desktop"
run = "steiger src"

[tasks.typecheck]
description = "타입 체크 (tsc, 패키지별)"
run = "turbo typecheck"

[tasks.test]
description = "JS/TS 테스트 (Vitest, 패키지별)"
run = "turbo test"

# --- Rust 품질 (툴체인 기본) ---
[tasks.rust-fmt-check]
description = "Rust 포맷 검증"
dir = "apps/desktop/src-tauri"
run = "cargo fmt --check"

[tasks.clippy]
description = "Rust 린트 (clippy, 경고를 에러로)"
dir = "apps/desktop/src-tauri"
run = "cargo clippy -- -D warnings"

[tasks.rust-test]
description = "Rust 테스트"
dir = "apps/desktop/src-tauri"
run = "cargo test"

# --- 실앱 E2E (check 미포함 — 앱 실행 필요, CI에서 실행) ---
[tasks.e2e]
description = "실앱 E2E 스모크 (tauri-plugin-webdriver — 개발 빌드 앱이 실행 중이어야 함)"
dir = "apps/desktop"
run = "pnpm test:e2e"

[tasks.verify-native]
description = "네이티브 검증(전체화면 토글 클릭 등) — 실제 OS 입력이라 앱을 최상위로 세운다(dev-webdriver 필요, 로컬 전용)"
dir = "apps/desktop"
run = "node scripts/verify-native.mjs"

# --- PR 데모 영상 (E2E 화면을 그대로 녹화 → GitHub CDN 업로드) ---
[tasks.demo]
description = "E2E 시나리오를 녹화해 데모 영상 생성 (dev-webdriver 앱이 실행 중이어야 함)"
run = "bash scripts/record-demo.sh"

[tasks.upload-demo]
description = "영상·스크린샷을 GitHub CDN에 업로드하고 PR 첨부용 URL 출력 (커밋 없이)"
run = "bash scripts/upload-attachment.sh"

# --- 번들 크기 측정 (check 미포함 — 빌드 산출물 필요) ---
[tasks.bundle-size]
description = "번들 크기 측정 (프론트엔드 dist + 앱 번들, 목표 <15MB — build 후 실행)"
run = "node scripts/bundle-size.mjs"

# --- 아이콘 생성 (SVG 원본 → React 컴포넌트 — 생성물을 커밋한다) ---
[tasks.icons]
description = "아이콘 생성 (shared/ui/icons/svg → generated, SVGR — 생성물은 커밋한다)"
dir = "apps/desktop"
run = """
mkdir -p src/shared/ui/icons/svg src/shared/ui/icons/generated
pnpm svgr --config-file svgr.config.cjs --no-index \
  --out-dir src/shared/ui/icons/generated src/shared/ui/icons/svg
# 생성물이 있을 때만 포맷한다 — 원본이 아직 없으면 svgr는 no-op이고 포맷할 것도 없다.
if ls src/shared/ui/icons/generated/*.tsx >/dev/null 2>&1; then
  oxfmt src/shared/ui/icons/generated
fi
"""

# --- 문서-코드 정합 ---
[tasks.docs-drift]
description = "문서-코드 드리프트 검사 (계약 문서 ↔ 코드 기계 대조)"
run = "node scripts/docs-drift.mjs"

# --- 통합 게이트 (커밋 전 필수) ---
[tasks.check]
description = "포맷·린트·FSD·타입·테스트·드리프트 게이트 (JS/TS + Rust, 수정 없이 검증)"
depends = [
  "fmt-check",
  "lint",
  "fsd-lint",
  "typecheck",
  "test",
  "rust-fmt-check",
  "clippy",
  "rust-test",
  "docs-drift",
]
