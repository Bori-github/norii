# 전체 게이트의 원격 강제 — 2단 구조의 2단이다(→ .claude/docs/code-quality.md#게이트-자동화-훅과-ci).
# 커밋 훅(1단)은 변경 파일만 빠르게 검사한다. 이 워크플로는 PR과 main 푸시마다
# `mise run check` 전체를 돌려, 로컬에서 게이트가 실수로 우회돼도 병합 경계에서 잡는다.
name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    # mac 러너 — 운영 1순위 플랫폼과 같은 계열이고, 브라우저 테스트(WebKit)가 실제 엔진으로 돈다.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      # .mise.toml의 툴 핀(node·pnpm·rust)을 그대로 설치한다 — 로컬과 같은 버전으로 돈다.
      - uses: jdx/mise-action@v2

      # Rust 빌드 캐시 — clippy·cargo test가 매번 전체 컴파일하지 않게 한다.
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - run: pnpm install --frozen-lockfile

      # 브라우저 테스트용 WebKit — 버전은 lockfile의 playwright 핀을 따른다.
      # playwright는 루트가 아니라 워크스페이스 패키지의 의존성이다 — 루트 pnpm exec는 못 찾는다.
      # 같은 버전을 핀한 두 패키지가 공유 브라우저 캐시를 쓰므로 desktop 한 곳의 설치로 충분하다.
      - run: pnpm --filter desktop exec playwright install webkit

      - run: mise run check
